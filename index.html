<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programa Selia · CRM Comercial</title>
<style>
  :root{
    --nav:#101728;          /* sidebar */
    --nav-2:#0b1120;
    --nav-active:#2563eb;
    --bg:#f5f7fb;
    --card:#ffffff;
    --ink:#0f172a;
    --ink-2:#475569;
    --ink-3:#94a3b8;
    --line:#e6eaf1;
    --blue:#2563eb;
    --blue-soft:#eff4ff;
    --green:#16a34a;
    --green-soft:#e9f8ef;
    --red:#e23b46;
    --red-soft:#fdeced;
    --amber:#e08a17;
    --amber-soft:#fdf3e3;
    --violet:#7c3aed;
    --violet-soft:#f1ecfe;
    --radius:12px;
    --shadow:0 1px 2px rgba(16,23,40,.06), 0 1px 3px rgba(16,23,40,.05);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:9px}

  .app{display:flex;min-height:100vh}

  /* ---------- SIDEBAR ---------- */
  .side{width:226px;background:var(--nav);color:#cbd5e1;flex:none;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:20px 22px;font-weight:700;color:#fff;font-size:16px;letter-spacing:.2px;border-bottom:1px solid rgba(255,255,255,.06)}
  .nav{padding:10px 12px;flex:1;overflow-y:auto}
  .nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:#64748b;padding:14px 12px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:#cbd5e1;font-size:13.5px;width:100%;text-align:left;transition:.12s}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav-item.active{background:var(--nav-active);color:#fff;font-weight:600}
  .nav-item .ico{width:17px;text-align:center;opacity:.85}
  .nav-item .badge{margin-left:auto;background:rgba(255,255,255,.14);color:#fff;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:600}
  .nav-item.active .badge{background:rgba(255,255,255,.25)}
  .nav-sub{padding-left:30px;font-size:13px;color:#93a2b8}
  .side-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;color:#8a99af}
  .side-foot b{color:#e2e8f0;display:block;font-size:13px;font-weight:600}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{padding:20px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
  .h-ico{width:42px;height:42px;border-radius:11px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
  .h-wrap{display:flex;gap:14px;align-items:center}
  h1{font-size:21px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--ink-2);font-size:13px;margin-top:2px}
  .rt{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);background:#fff;border:1px solid var(--line);padding:7px 12px;border-radius:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .content{padding:22px 28px 40px}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
  .stat .sicon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
  .stat .n{font-size:23px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
  .stat .l{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:7px;margin-top:1px}
  .stat .l .pin{width:9px;height:9px;border-radius:3px}

  /* CRM top bar + filters */
  .crm-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .crm-tabs{display:flex;gap:8px;flex-wrap:wrap}
  .crm-actions{display:flex;gap:8px;flex-wrap:wrap}
  .filter-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
  .ff{display:flex;flex-direction:column;gap:5px}
  .ff label{font-size:11.5px;color:var(--ink-2);font-weight:600}
  .ff input,.ff select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--ink);outline:none;background:#fff}
  .prio-cell{display:inline-flex;align-items:center;gap:7px}
  .prio-sel{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12.5px;font-weight:600;color:var(--ink);background:#fff;cursor:pointer;outline:none}
  tr.lb-sin_gestionar{border-left:3px solid #6366f1}
  @media(max-width:760px){.filter-row{grid-template-columns:1fr 1fr}}

  /* description banner */
  .banner{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:10px;padding:13px 16px;margin-bottom:18px;font-size:13px;color:var(--ink-2);display:flex;gap:11px}
  .banner b{color:var(--ink)}
  .banner .bico{font-size:16px}

  /* toolbar */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 13px;color:var(--ink-3);font-size:13.5px}
  .search input{border:none;outline:none;flex:1;font-size:13.5px;color:var(--ink)}
  .filter-chip{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:13px;color:var(--ink-2)}

  /* table */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);font-weight:600;padding:13px 16px;border-bottom:1px solid var(--line);background:#fbfcfe}
  tbody td{padding:13px 16px;border-bottom:1px solid #f1f4f9;font-size:13.5px;vertical-align:middle}
  tbody tr{transition:background .1s}
  tbody tr:hover{background:#fafbfe}
  tbody tr:last-child td{border-bottom:none}
  .name{font-weight:600;cursor:pointer}
  .name:hover{color:var(--blue)}
  .tel{color:var(--ink-2);font-variant-numeric:tabular-nums}
  .muted{color:var(--ink-3);font-size:12.5px}

  /* row tint */
  tr.tint-red{background:var(--red-soft)!important}
  tr.tint-green{background:var(--green-soft)!important}
  tr.tint-amber{background:var(--amber-soft)!important}
  tr.tint-violet{background:var(--violet-soft)!important}
  tr.tint-gray{background:#f7f8fa!important}

  /* big buttons + lock screen */
  .btn-lg{padding:9px 15px;font-size:13px}
  .lock{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:48px 32px;text-align:center;max-width:560px;margin:30px auto}
  .lock-ico{font-size:42px;margin-bottom:8px}
  .lock h2{font-size:19px;margin-bottom:8px}
  .lock p{color:var(--ink-2);font-size:14px;max-width:420px;margin:0 auto 20px;line-height:1.5}
  .lock-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .lock-note{margin-top:18px;font-size:12.5px;color:var(--ink-3)}

  /* pills */
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .pill.blue{background:var(--blue-soft);color:var(--blue)}
  .pill.green{background:var(--green-soft);color:var(--green)}
  .pill.red{background:var(--red-soft);color:var(--red)}
  .pill.amber{background:var(--amber-soft);color:var(--amber)}
  .pill.violet{background:var(--violet-soft);color:var(--violet)}
  .pill.gray{background:#eef1f6;color:var(--ink-2)}

  .prio{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
  .prio .pdot{width:9px;height:9px;border-radius:50%}

  /* laura state */
  .laura{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
  .laura.on{color:var(--green)}
  .laura.off{color:var(--ink-3)}
  .laura .wave{display:inline-flex;gap:2px;align-items:flex-end;height:11px}
  .laura .wave i{width:2.5px;background:var(--green);border-radius:2px;animation:wv .9s infinite ease-in-out}
  .laura .wave i:nth-child(1){height:5px;animation-delay:0s}
  .laura .wave i:nth-child(2){height:11px;animation-delay:.15s}
  .laura .wave i:nth-child(3){height:7px;animation-delay:.3s}
  @keyframes wv{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}

  .calls{font-weight:700;font-variant-numeric:tabular-nums}
  .calls .of{color:var(--ink-3);font-weight:500;font-size:12px}

  /* action buttons */
  .acts{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:8px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink-2);transition:.12s;white-space:nowrap}
  .btn:hover{border-color:#c9d3e3;background:#fafbfe}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.primary:hover{background:#1d4ed8}
  .btn.danger{color:var(--red)}
  .btn.danger:hover{background:var(--red-soft);border-color:#f3c2c5}
  .btn.warn{color:var(--amber)}
  .btn.warn:hover{background:var(--amber-soft)}
  .btn.ghost-green{color:var(--green)}
  .btn.ghost-green:hover{background:var(--green-soft);border-color:#bce8cd}
  .icon-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-3);border:1px solid transparent}
  .icon-btn:hover{background:#f1f4f9;color:var(--ink)}

  /* CRM row controls */
  .estado-sel{font-size:12.5px;font-weight:600;border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#fff;color:var(--ink);cursor:pointer;outline:none}
  .stepper{display:inline-flex;align-items:center;gap:7px}
  .stepper button{width:22px;height:22px;border:1px solid var(--line);border-radius:6px;color:var(--ink-2);font-weight:700;line-height:1}
  .stepper button:hover{background:#f1f4f9}
  .stepper .cn{font-weight:700;min-width:12px;text-align:center;font-variant-numeric:tabular-nums}
  .lnk{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 8px;border-radius:7px;color:var(--ink-2);white-space:nowrap}
  .lnk:hover{background:#f1f4f9}
  .lnk.green{color:var(--green)} .lnk.green:hover{background:var(--green-soft)}
  .lnk.red{color:var(--red)} .lnk.red:hover{background:var(--red-soft)}
  .lnk.amber{color:var(--amber)} .lnk.amber:hover{background:var(--amber-soft)}
  .lnk.blue{color:var(--blue)} .lnk.blue:hover{background:var(--blue-soft)}
  tr.lb-urgente{border-left:3px solid var(--red)} tr.lb-alta{border-left:3px solid var(--amber)}
  tr.lb-media{border-left:3px solid var(--blue)} tr.lb-baja{border-left:3px solid #cbd5e1}
  /* priority filter chips */
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .chip:hover{border-color:#c9d3e3}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .pdot{width:9px;height:9px;border-radius:50%}
  .chip .cc{background:#eef1f6;color:var(--ink-2);border-radius:20px;padding:0 7px;font-size:11px}
  .chip.on .cc{background:rgba(255,255,255,.22);color:#fff}

  /* motivo cell */
  .motivo{max-width:280px}
  .motivo .t{font-weight:600;margin-bottom:2px}
  .motivo .m{color:var(--ink-2);font-size:12.5px;line-height:1.35}

  /* KANBAN (crm comercial) */
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
  .col{background:#eef1f6;border-radius:var(--radius);padding:10px;min-height:120px}
  .col-head{display:flex;align-items:center;gap:8px;padding:5px 7px 11px;font-weight:700;font-size:13.5px}
  .col-head .pdot{width:10px;height:10px;border-radius:50%}
  .col-head .ct{margin-left:auto;background:#fff;color:var(--ink-2);font-size:11.5px;padding:1px 8px;border-radius:20px;border:1px solid var(--line)}
  .kcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;border-left:3px solid transparent}
  .kcard:hover{border-color:#c9d3e3}
  .kcard .kname{font-weight:600;margin-bottom:6px}
  .kcard .ktel{font-size:12px;color:var(--ink-2);margin-bottom:8px;font-variant-numeric:tabular-nums}
  .kcard .kmotivo{font-size:12px;color:var(--ink-2);background:#f8fafc;border-radius:7px;padding:7px 9px;margin-bottom:9px;line-height:1.35}
  .kcard .kfoot{display:flex;align-items:center;gap:7px;justify-content:space-between}
  .kcard .kfoot .ag{font-size:11.5px;color:var(--ink-3)}
  .kcard .kacts{display:flex;gap:5px}
  .empty-col{text-align:center;color:var(--ink-3);font-size:12px;padding:18px 8px}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.35);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:92vw;background:#fff;box-shadow:-8px 0 30px rgba(16,23,40,.14);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
  .drawer.show{transform:none}
  .dr-head{padding:20px 22px;border-bottom:1px solid var(--line)}
  .dr-head .x{position:absolute;top:18px;right:18px}
  .dr-name{font-size:18px;font-weight:700}
  .dr-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .dr-body{padding:20px 22px;overflow-y:auto;flex:1}
  .dr-sec-t{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);font-weight:600;margin:18px 0 10px}
  .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #eef1f6;font-size:13px}
  .kv .k{color:var(--ink-2)}
  .kv .v{font-weight:600}
  /* timeline */
  .tl{position:relative;padding-left:22px;margin-top:6px}
  .tl::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl-item{position:relative;padding:0 0 16px}
  .tl-item::before{content:"";position:absolute;left:-22px;top:3px;width:11px;height:11px;border-radius:50%;background:#fff;border:2.5px solid var(--blue)}
  .tl-item.ok::before{border-color:var(--green)}
  .tl-item.bad::before{border-color:var(--red)}
  .tl-item.warn::before{border-color:var(--amber)}
  .tl-when{font-size:11.5px;color:var(--ink-3);margin-bottom:2px}
  .tl-what{font-size:13px}
  .tl-what b{font-weight:600}
  .json{background:var(--nav-2);color:#cbd5e1;border-radius:9px;padding:14px 15px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre}
  .json .key{color:#7dd3fc}.json .str{color:#86efac}.json .num{color:#fca5a5}
  .dr-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}

  /* flow diagram */
  .flow{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
  .flow h3{font-size:15px;margin-bottom:4px}
  .flow .fsub{color:var(--ink-2);font-size:13px;margin-bottom:22px}
  .lanes{display:flex;flex-direction:column;gap:14px}
  .lane{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .lane-src{background:var(--nav);color:#fff;border-radius:11px;padding:14px 18px;min-width:150px;text-align:center}
  .lane-src .ls-t{font-weight:700;font-size:14px}
  .lane-src .ls-s{font-size:11.5px;color:#9fb0c7;margin-top:3px}
  .rule{flex:1;min-width:230px;background:#fbfcfe;border:1px dashed var(--line);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--ink-2)}
  .rule b{color:var(--ink)}
  .arrow{color:var(--ink-3);font-size:20px;flex:none}
  .dest{border-radius:10px;padding:12px 16px;font-weight:700;font-size:13.5px;min-width:170px;text-align:center;color:#fff}
  .dest.nc{background:#475569}.dest.rev{background:var(--amber)}.dest.crm{background:var(--blue)}.dest.arch{background:#94a3b8}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}
  .legend .li{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-2)}
  .legend .sw{width:26px;height:14px;border-radius:5px}

  .hidden{display:none!important}

  /* toast */
  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:var(--nav);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(16,23,40,.25);display:flex;align-items:center;gap:9px;animation:up .25s ease}
  .toast .ti{color:#7dd3fc}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  @media(max-width:900px){
    .side{display:none}
    .kanban{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="side">
    <div class="brand">Programa Selia</div>
    <nav class="nav">
      <button class="nav-item"><span class="ico">▦</span> Dashboard</button>
      <button class="nav-item"><span class="ico">▤</span> Resúmenes</button>
      <button class="nav-item"><span class="ico">◎</span> Llegada</button>
      <button class="nav-item"><span class="ico">💬</span> Dronchat</button>
      <button class="nav-item"><span class="ico">🪪</span> Lead ID</button>
      <button class="nav-item"><span class="ico">▥</span> CRM General</button>

      <div class="nav-label">CRM Comercial</div>
      <button class="nav-item" data-view="nocontesta"><span class="ico">📵</span> No Contesta <span class="badge" data-count="nocontesta">0</span></button>
      <button class="nav-item" data-view="revision"><span class="ico">🔍</span> Revisión <span class="badge" data-count="revision">0</span></button>
      <button class="nav-item" data-view="pendiente"><span class="ico">🗂</span> Pendiente de gestionar <span class="badge" data-count="pendiente">0</span></button>
      <button class="nav-item" data-view="crm"><span class="ico">👤</span> CRM Comercial <span class="badge" data-count="crm">0</span></button>
      <button class="nav-item" data-view="archivados"><span class="ico">🗑</span> Archivados <span class="badge" data-count="archivados">0</span></button>

      <div class="nav-label">Otros</div>
      <button class="nav-item"><span class="ico">☰</span> Tareas</button>
      <button class="nav-item"><span class="ico">▢</span> Pólizas</button>
    </nav>
    <div class="side-foot">
      <b>francisco@selia.es</b>
      Supremo
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="h-wrap">
        <div class="h-ico" id="hIco">⤴</div>
        <div>
          <h1 id="hTitle">Vista general</h1>
          <div class="sub" id="hSub">Cómo se enrutan los leads desde Laura hacia el equipo comercial</div>
        </div>
      </div>
      <div class="rt"><span class="dot"></span> Tiempo real</div>
    </div>

    <div class="content" id="content"></div>
  </main>
</div>

        <td class="tel">${l.tel}<div class="muted">Decesos</div></td>
        <td><div class="prio-cell"><span class="pdot" style="background:${PRIOS[l.prioridad||'media'].color}"></span><select class="prio-sel" onchange="setPrio(${l.id},this.value)">${prioOpts}</select></div></td>
        <td><div class="stepper"><button onclick="incContactos(${l.id},-1)">−</button><span class="cn">${l.contactos}</span><button onclick="incContactos(${l.id},1)">+</button></div></td>
        <td><select class="estado-sel" onchange="setVenta(${l.id},this.value)">${opts}</select></td>
        <td><div class="acts">
          ${l.estadoVenta==="vendida"
            ? `<button class="lnk amber" onclick="setVenta(${l.id},'presupuesto')">↺ Revertir venta</button>`
            : `<button class="lnk green" onclick="setVenta(${l.id},'vendida')">✓ Venta cerrada</button>`}
          ${l.estadoVenta==="no_cerrado"
            ? `<button class="lnk blue" onclick="setVenta(${l.id},'presupuesto')">↺ Reabrir</button>`
            : `<button class="lnk red" onclick="setVenta(${l.id},'no_cerrado')">✕ No cerrado</button>`}
          ${l.lauraOn
            ? `<button class="lnk amber" onclick="pararLaura(${l.id})">☐ Parar Laura</button>`
            : `<button class="lnk" onclick="reanudarLaura(${l.id})">▣ Parado</button>`}
          <button class="lnk blue" onclick="transferir(${l.id})">➤ Transferir</button>
          <button class="lnk red" onclick="moveTo(${l.id},'archivados')">🗑 Archivar</button>
        </div></td>
      </tr>`;}).join("")||emptyRow(7,"No hay leads en esta prioridad.")}
    </tbody>
  </table></div>`;
}

/* ---- ARCHIVADOS ---- */
function renderArchivados(){
  const rows=leadsIn("archivados");
  return `
  <div class="banner" style="border-left-color:#94a3b8"><span class="bico">🗑</span><div><b>Papelera del Lead ID.</b> Leads retirados desde cualquier bandeja. Conserva su línea temporal y se pueden restaurar en cualquier momento.</div></div>
  ${toolbar("Buscar en archivados…")}
  <div class="panel"><table>
    <thead><tr>
      <th>Nombre</th><th>Teléfono</th><th>Motivo de entrada</th><th>Archivado</th><th></th>
    </tr></thead>
    <tbody>${rows.map(l=>`
      <tr>
        <td><span class="name" onclick="openDrawer(${l.id})">${l.nombre}</span><div class="muted">Decesos</div></td>
        <td class="tel">${l.tel}</td>
        <td class="motivo"><div class="t">${pill(l.tipo)}</div><div class="m">${l.motivo}</div></td>
        <td class="muted">${l.ult}</td>
        <td><div class="acts">
          <button class="btn ghost-green" onclick="restaurar(${l.id})">↩ Restaurar</button>
        </div></td>
      </tr>`).join("")||emptyRow(5,"La papelera está vacía.")}
    </tbody>
  </table></div>`;
}

function emptyRow(cols,txt){return `<tr><td colspan="${cols}" style="text-align:center;color:var(--ink-3);padding:34px">${txt}</td></tr>`;}

/* ============ ACCIONES ============ */
function find(id){return LEADS.find(l=>l.id===id);}

function pararLaura(id){
  const l=find(id); l.lauraOn=false;
  toast(`⏸ Laura parada para <b>${l.nombre}</b>. El lead pasa a gestión humana.`);
  render();
}
function reanudarLaura(id){
  const l=find(id); l.lauraOn=true;
  toast(`▶ Laura reanudada para <b>${l.nombre}</b>.`);
  render();
}
function setVenta(id,val){
  const l=find(id); l.estadoVenta=val;
  toast(`<b>${l.nombre}</b> · ${VENTA[val].label}`);
  render();
}
function incContactos(id,d){
  const l=find(id); l.contactos=Math.max(0,(l.contactos||0)+d);
  render();
}
function transferir(id){
  const l=find(id);
  toast(`➤ <b>${l.nombre}</b> marcado para transferir a otro agente.`);
}
function setCrmFilter(p){ crmFilter=p; render(); }
function dejarLaura(id){
  const l=find(id); l.lauraOn=true; l.bolsa="nocontesta"; // vuelve al circuito de Laura
  toast(`↩ <b>${l.nombre}</b> vuelve al seguimiento de Laura.`);
  render();
}
function moveTo(id,bolsa){
  const l=find(id);
  if(bolsa==="crm"){
    l.lauraOn=false;
    if(!l.prioridad) l.prioridad="media";
    if(!l.estadoVenta) l.estadoVenta="introduccion";
    if(l.contactos===undefined) l.contactos=0;
    if(!l.agente) l.agente="Miguel Frías";
    if(!l.fecha) l.fecha=(l.ult||"").replace(" jun ","/6 ");
  }
  l.bolsa=bolsa;
  const names={crm:"CRM Comercial",archivados:"Archivados",nocontesta:"No Contesta",revision:"Revisión",pendiente:"Pendiente de gestionar"};
  toast(`<b>${l.nombre}</b> → ${names[bolsa]}`);
  closeDrawer(); render();
}
function clasificar(id){
  const l=find(id);
  if(!l.prioridad){
    toast(`⚠️ Elige una prioridad para <b>${l.nombre}</b> antes de pasarlo.`);
    return;
  }
  moveTo(id,"crm");
}
function restaurar(id){
  const l=find(id);
  l.bolsa = l.tipo==="no_contesta" ? "nocontesta" : "pendiente";
  if(l.bolsa==="pendiente") l.prioridad=undefined; // vuelve a clasificarse
  toast(`↩ <b>${l.nombre}</b> restaurado a ${l.bolsa==='nocontesta'?'No Contesta':'Pendiente de gestionar'}.`);
  render();
}
function setPrio(id,val){
  const l=find(id); l.prioridad = val||undefined;
  if(val) toast(`Prioridad de <b>${l.nombre}</b>: ${PRIOS[val].label}`);
  render();
}
function cyclePrio(id){
  if(typeof event!=='undefined'&&event) event.stopPropagation();
  const order=["urgente","alta","media","baja"];
  const l=find(id);
  const i=order.indexOf(l.prioridad||"media");
  l.prioridad=order[(i+1)%order.length];
  toast(`Prioridad de <b>${l.nombre}</b>: ${PRIOS[l.prioridad].label}`);
  render();
}

/* ============ DRAWER + JSON ============ */
function openDrawer(id){
  const l=find(id);
  document.getElementById("drName").textContent=l.nombre;
  document.getElementById("drTags").innerHTML =
    pill(l.tipo) +
    (l.prioridad?`<span class="prio"><span class="pdot" style="background:${PRIOS[l.prioridad].color}"></span>${PRIOS[l.prioridad].label}</span>`:"") +
    lauraTag(l);

  const jsonPayload =
`{
  <span class="key">"lead_id"</span>: <span class="num">${l.id}</span>,
  <span class="key">"telefono"</span>: <span class="str">"${l.tel}"</span>,
  <span class="key">"producto"</span>: <span class="str">"decesos"</span>,
  <span class="key">"tipo"</span>: <span class="str">"${l.tipo}"</span>,
  <span class="key">"motivo"</span>: <span class="str">"${l.motivo.replace(/"/g,'\\"')}"</span>,
  <span class="key">"llamadas"</span>: <span class="num">${l.llamadas}</span>,
  <span class="key">"laura_activa"</span>: ${l.lauraOn?'<span class="num">true</span>':'<span class="num">false</span>'},
  <span class="key">"destino"</span>: <span class="str">"${l.bolsa}"</span>
}`;

  document.getElementById("drBody").innerHTML=`
    <div class="dr-sec-t">Datos del lead</div>
    <div class="kv"><span class="k">Teléfono</span><span class="v">${l.tel}</span></div>
    <div class="kv"><span class="k">Producto</span><span class="v">Decesos</span></div>
    <div class="kv"><span class="k">Llamadas de Laura</span><span class="v">${l.llamadas}</span></div>
    <div class="kv"><span class="k">Bandeja actual</span><span class="v">${VIEWS[l.bolsa]?.title||l.bolsa}</span></div>

    <div class="dr-sec-t">Motivo de entrada</div>
    <div style="background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:13px;color:var(--ink-2)">${l.motivo}</div>

    <div class="dr-sec-t">Payload recibido (JSON)</div>
    <div class="json">${jsonPayload}</div>

    <div class="dr-sec-t">Línea temporal del cliente</div>
    <div class="tl">${TIMELINE.default.map(t=>`
      <div class="tl-item ${t.cls}"><div class="tl-when">${t.when}</div><div class="tl-what">${t.what}</div></div>`).join("")}
    </div>`;

  // footer actions contextual
  let foot="";
  if(l.bolsa==="nocontesta") foot = `<button class="btn primary" onclick="moveTo(${l.id},'crm')">→ CRM Comercial</button>`;
  else if(l.bolsa==="revision") foot=`<button class="btn primary" onclick="moveTo(${l.id},'crm')">→ CRM Comercial</button><button class="btn ghost-green" onclick="dejarLaura(${l.id})">↩ Dejar a Laura</button>`;
  else if(l.bolsa==="pendiente") foot=`<button class="btn primary" onclick="clasificar(${l.id})">→ Pasar a CRM (con prioridad)</button><button class="btn" onclick="cyclePrio(${l.id})">⇅ Prioridad</button>`;
  else if(l.bolsa==="crm") foot=`
    ${l.estadoVenta==="vendida"?`<button class="btn warn" onclick="setVenta(${l.id},'presupuesto')">↺ Revertir venta</button>`:`<button class="btn ghost-green" onclick="setVenta(${l.id},'vendida')">✓ Venta cerrada</button>`}
    ${l.estadoVenta==="no_cerrado"?`<button class="btn" onclick="setVenta(${l.id},'presupuesto')">↺ Reabrir</button>`:`<button class="btn danger" onclick="setVenta(${l.id},'no_cerrado')">✕ No cerrado</button>`}
    <button class="btn" onclick="cyclePrio(${l.id})">⇅ Prioridad</button>
    <button class="btn primary" onclick="transferir(${l.id})">➤ Transferir</button>`;
  else if(l.bolsa==="archivados") foot=`<button class="btn ghost-green" onclick="restaurar(${l.id})">↩ Restaurar</button>`;
  foot+=`<button class="btn danger" onclick="moveTo(${l.id},'archivados')">🗑 Archivar</button>`;
  document.getElementById("drFoot").innerHTML=foot;

  document.getElementById("drawer").classList.add("show");
  document.getElementById("scrim").classList.add("show");
}
function closeDrawer(){
  document.getElementById("drawer").classList.remove("show");
  document.getElementById("scrim").classList.remove("show");
}

/* ============ TOAST ============ */
function toast(html){
  const w=document.getElementById("toastWrap");
  const t=document.createElement("div");
  t.className="toast"; t.innerHTML=`<span class="ti">✓</span><span>${html}</span>`;
  w.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transform="translateY(8px)";t.style.transition=".3s";setTimeout(()=>t.remove(),300);},2600);
}

/* ============ INIT ============ */
document.querySelectorAll(".nav-item[data-view]").forEach(n=>n.addEventListener("click",()=>setView(n.dataset.view)));
setView("revision");
</script>
</body>
</html>
